<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ESP-01S 雙設備 MQTT 遠端開關</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ESP開關">

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --border: #e5e7eb;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      --disabled: #9ca3af;
      --secondary: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
    }

    .dot.online {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.16);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 10px;
    }

    .title-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .device-meta {
      font-size: 0.82rem;
      color: var(--muted);
      word-break: break-all;
    }

    .badge-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .state,
    .online-state {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      background: var(--muted);
      white-space: nowrap;
    }

    .state.on { background: var(--success); }
    .state.off { background: var(--danger); }

    .online-state.online { background: var(--success); }
    .online-state.offline { background: var(--warning); }

    .summary {
      margin: 8px 0 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.93rem;
      line-height: 1.7;
    }

    .summary strong {
      color: var(--primary);
    }

    .updated {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      transition: opacity 0.2s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      background: var(--disabled) !important;
      color: #fff !important;
    }

    .btn-on { background: #16a34a; color: #fff; }
    .btn-off { background: #ef4444; color: #fff; }
    .btn-save { background: var(--primary); color: #fff; width: 100%; margin-top: 10px; }
    .btn-sync { background: var(--secondary); color: #fff; }

    .line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
      font-size: 0.95rem;
    }

    input[type="time"] {
      width: 120px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }

    input[type="time"]:disabled,
    input[type="checkbox"]:disabled {
      opacity: 0.6;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
    }

    .msg {
      font-size: 0.92rem;
      color: var(--muted);
      min-height: 1.4em;
      white-space: pre-wrap;
    }

    @media (max-width: 560px) {
      .title-row {
        flex-direction: column;
      }

      .badge-wrap {
        justify-content: flex-start;
      }

      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>ESP-01S 雙設備 MQTT 遠端開關</h1>
      <div class="status-bar">
        <span id="dot" class="dot"></span>
        <span>MQTT 連線狀態：<span id="connText">離線</span></span>
      </div>
    </div>

    <div id="card1" class="card"></div>
    <div id="card2" class="card"></div>

    <div class="card">
      <strong>訊息提示</strong>
      <div id="msg" class="msg">等待連線…</div>
    </div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const MQTT_URL = "wss://broker.emqx.io:8084/mqtt";
    const DEVICES = [
      { id: "switch01", name: "開關 1", base: "gavinwea414-a11y/esp-switch01/relay1" },
      { id: "switch02", name: "開關 2", base: "gavinwea414-a11y/esp-switch02/relay1" }
    ];

    const state = {};
    let isConnected = false;

    const msgEl = document.getElementById("msg");
    const dotEl = document.getElementById("dot");
    const connTextEl = document.getElementById("connText");

    function log(msg) {
      const ts = new Date().toLocaleTimeString("zh-TW", { hour12: false });
      msgEl.textContent = `[${ts}] ${msg}\n` + msgEl.textContent.slice(0, 2500);
    }

    function formatNow() {
      return new Date().toLocaleString("zh-TW", {
        hour12: false,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function t(base, suffix) {
      return `${base}/${suffix}`;
    }

    function getTopics(base) {
      return {
        set: t(base, "set"),
        state: t(base, "state"),
        autoSet: t(base, "auto/enabled/set"),
        autoState: t(base, "auto/enabled/state"),
        onSet: t(base, "schedule/on/set"),
        onState: t(base, "schedule/on/state"),
        offSet: t(base, "schedule/off/set"),
        offState: t(base, "schedule/off/state"),
        status: t(base, "status"),
        heartbeat: t(base, "heartbeat"),
        event: t(base, "event")
      };
    }

    function buildCard(device, mountId) {
      state[device.id] = {
        relay: "OFF",
        autoEnabled: true,
        onTime: "19:00",
        offTime: "23:30",
        lastUpdated: "尚未更新",
        heartbeat: "尚未收到",
        lastEvent: "尚未收到",
        status: "offline",
        topics: getTopics(device.base),
        pendingSave: null
      };

      const mount = document.getElementById(mountId);
      mount.innerHTML = `
        <div class="title-row">
          <div class="title-left">
            <strong>${device.name}</strong>
            <div class="device-meta">Topic Base：${device.base}</div>
          </div>
          <div class="badge-wrap">
            <span id="${device.id}_online" class="online-state offline">設備離線</span>
            <span id="${device.id}_state" class="state off">關閉</span>
          </div>
        </div>

        <div id="${device.id}_summary" class="summary">
          <div><strong>排程摘要：</strong>自動：啟用｜開 19:00｜關 23:30</div>
          <div><strong>最後 heartbeat：</strong><span id="${device.id}_heartbeat">尚未收到</span></div>
          <div><strong>最後事件：</strong><span id="${device.id}_event">尚未收到</span></div>
          <div id="${device.id}_updated" class="updated">最後更新：尚未更新</div>
        </div>

        <div class="btn-row">
          <button class="btn-on" id="${device.id}_on">手動開啟</button>
          <button class="btn-off" id="${device.id}_off">手動關閉</button>
        </div>

        <div class="btn-row">
          <button class="btn-sync" id="${device.id}_sync">重新同步狀態</button>
        </div>

        <div class="line">
          <label for="${device.id}_auto">啟用自動排程</label>
          <input type="checkbox" id="${device.id}_auto" checked />
        </div>

        <div class="line">
          <label for="${device.id}_on_time">開啟時間</label>
          <input type="time" id="${device.id}_on_time" value="19:00" />
        </div>

        <div class="line">
          <label for="${device.id}_off_time">關閉時間</label>
          <input type="time" id="${device.id}_off_time" value="23:30" />
        </div>

        <button class="btn-save" id="${device.id}_save">儲存設定</button>
      `;
    }

    function touchUpdated(device) {
      state[device.id].lastUpdated = formatNow();
    }

    function renderDeviceOnline(device) {
      const s = state[device.id];
      const badge = document.getElementById(`${device.id}_online`);
      const online = s.status === "online";

      badge.textContent = online ? "設備在線" : "設備離線";
      badge.className = `online-state ${online ? "online" : "offline"}`;
    }

    function renderSummary(device) {
      const s = state[device.id];

      document.getElementById(`${device.id}_summary`).innerHTML = `
        <div><strong>排程摘要：</strong>自動：${s.autoEnabled ? "啟用" : "停用"}｜開 ${s.onTime}｜關 ${s.offTime}</div>
        <div><strong>最後 heartbeat：</strong><span id="${device.id}_heartbeat">${s.heartbeat}</span></div>
        <div><strong>最後事件：</strong><span id="${device.id}_event">${s.lastEvent}</span></div>
        <div id="${device.id}_updated" class="updated">最後更新：${s.lastUpdated}</div>
      `;
    }

    function renderState(device) {
      const s = state[device.id];
      const tag = document.getElementById(`${device.id}_state`);
      const isOn = s.relay === "ON";

      tag.textContent = isOn ? "開啟" : "關閉";
      tag.className = `state ${isOn ? "on" : "off"}`;

      document.getElementById(`${device.id}_auto`).checked = !!s.autoEnabled;
      document.getElementById(`${device.id}_on_time`).value = s.onTime || "19:00";
      document.getElementById(`${device.id}_off_time`).value = s.offTime || "23:30";

      renderSummary(device);
      renderDeviceOnline(device);
    }

    function setControlsEnabled(enabled) {
      DEVICES.forEach(d => {
        document.getElementById(`${d.id}_on`).disabled = !enabled;
        document.getElementById(`${d.id}_off`).disabled = !enabled;
        document.getElementById(`${d.id}_sync`).disabled = !enabled;
        document.getElementById(`${d.id}_auto`).disabled = !enabled;
        document.getElementById(`${d.id}_on_time`).disabled = !enabled;
        document.getElementById(`${d.id}_off_time`).disabled = !enabled;
        document.getElementById(`${d.id}_save`).disabled = !enabled;
      });
    }

    function subscribeDeviceTopics(device) {
      const tp = state[device.id].topics;
      [
        tp.state,
        tp.autoState,
        tp.onState,
        tp.offState,
        tp.status,
        tp.heartbeat,
        tp.event
      ].forEach(topic => client.subscribe(topic));
    }

    function sameTime(a, b) {
      return a === b;
    }

    function checkPendingSave(device) {
      const s = state[device.id];
      if (!s.pendingSave) return;

      const p = s.pendingSave;
      const autoMatched = s.autoEnabled === p.autoEnabled;
      const onMatched = s.onTime === p.onTime;
      const offMatched = s.offTime === p.offTime;

      if (autoMatched && onMatched && offMatched) {
        log(`${device.name} → 設定已確認儲存`);
        s.pendingSave = null;
      }
    }

    function renderAll() {
      DEVICES.forEach(d => renderState(d));
      setControlsEnabled(isConnected);
    }

    DEVICES.forEach((d, idx) => buildCard(d, idx === 0 ? "card1" : "card2"));

    const client = mqtt.connect(MQTT_URL, {
      clientId: `web-esp-switch-${Math.random().toString(16).slice(2, 10)}`,
      clean: true,
      reconnectPeriod: 2000,
      connectTimeout: 8000
    });

    client.on("connect", () => {
      isConnected = true;
      dotEl.classList.add("online");
      connTextEl.textContent = "已連線";
      log("MQTT 已連線");

      DEVICES.forEach(d => subscribeDeviceTopics(d));
      renderAll();
    });

    client.on("reconnect", () => {
      isConnected = false;
      dotEl.classList.remove("online");
      connTextEl.textContent = "重新連線中";
      renderAll();
    });

    client.on("close", () => {
      isConnected = false;
      dotEl.classList.remove("online");
      connTextEl.textContent = "離線";
      log("MQTT 已斷線");
      renderAll();
    });

    client.on("offline", () => {
      isConnected = false;
      dotEl.classList.remove("online");
      connTextEl.textContent = "離線";
      renderAll();
    });

    client.on("error", (err) => {
      log(`連線錯誤：${err.message}`);
    });

    client.on("message", (topic, payloadBuf) => {
      const payload = payloadBuf.toString();

      DEVICES.forEach(d => {
        const s = state[d.id];
        const tp = s.topics;

        if (topic === tp.state) {
          s.relay = payload.toUpperCase() === "ON" ? "ON" : "OFF";
          touchUpdated(d);
          renderState(d);
          return;
        }

        if (topic === tp.autoState) {
          s.autoEnabled = ["1", "true", "on"].includes(payload.toLowerCase());
          touchUpdated(d);
          renderState(d);
          checkPendingSave(d);
          return;
        }

        if (topic === tp.onState) {
          if (/^\d{2}:\d{2}$/.test(payload)) s.onTime = payload;
          touchUpdated(d);
          renderState(d);
          checkPendingSave(d);
          return;
        }

        if (topic === tp.offState) {
          if (/^\d{2}:\d{2}$/.test(payload)) s.offTime = payload;
          touchUpdated(d);
          renderState(d);
          checkPendingSave(d);
          return;
        }

        if (topic === tp.status) {
          s.status = payload.toLowerCase() === "online" ? "online" : "offline";
          touchUpdated(d);
          renderState(d);
          return;
        }

        if (topic === tp.heartbeat) {
          s.heartbeat = payload;
          touchUpdated(d);
          renderState(d);
          return;
        }

        if (topic === tp.event) {
          s.lastEvent = payload;
          touchUpdated(d);
          renderState(d);
          return;
        }
      });
    });

    DEVICES.forEach(d => {
      const s = state[d.id];
      const tp = s.topics;

      document.getElementById(`${d.id}_on`).addEventListener("click", () => {
        if (!isConnected) {
          log(`${d.name} → 目前離線，無法送出指令`);
          return;
        }

        s.relay = "ON";
        s.lastEvent = "manual_on (waiting)";
        touchUpdated(d);
        renderState(d);
        client.publish(tp.set, "ON");
        log(`${d.name} → 手動開啟`);
      });

      document.getElementById(`${d.id}_off`).addEventListener("click", () => {
        if (!isConnected) {
          log(`${d.name} → 目前離線，無法送出指令`);
          return;
        }

        s.relay = "OFF";
        s.lastEvent = "manual_off (waiting)";
        touchUpdated(d);
        renderState(d);
        client.publish(tp.set, "OFF");
        log(`${d.name} → 手動關閉`);
      });

      document.getElementById(`${d.id}_sync`).addEventListener("click", () => {
        if (!isConnected) {
          log(`${d.name} → 目前離線，無法重新同步`);
          return;
        }

        subscribeDeviceTopics(d);
        log(`${d.name} → 已重新訂閱所有狀態 topic`);
      });

      document.getElementById(`${d.id}_save`).addEventListener("click", () => {
        if (!isConnected) {
          log(`${d.name} → 目前離線，無法儲存設定`);
          return;
        }

        const autoEnabled = document.getElementById(`${d.id}_auto`).checked;
        const onTime = document.getElementById(`${d.id}_on_time`).value;
        const offTime = document.getElementById(`${d.id}_off_time`).value;

        if (!/^\d{2}:\d{2}$/.test(onTime) || !/^\d{2}:\d{2}$/.test(offTime)) {
          log(`${d.name} → 時間格式錯誤，請使用 HH:MM`);
          return;
        }

        if (sameTime(onTime, offTime)) {
          log(`${d.name} → 開啟時間與關閉時間不能相同`);
          return;
        }

        s.autoEnabled = autoEnabled;
        s.onTime = onTime;
        s.offTime = offTime;
        s.pendingSave = { autoEnabled, onTime, offTime };

        touchUpdated(d);
        renderState(d);

        client.publish(tp.autoSet, autoEnabled ? "true" : "false");
        client.publish(tp.onSet, onTime);
        client.publish(tp.offSet, offTime);

        log(`${d.name} → 設定送出中，等待設備確認…`);
      });
    });

    renderAll();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("Service Worker 註冊成功"))
          .catch(err => console.error("Service Worker 註冊失敗:", err));
      });
    }
  </script>
</body>
</html>
